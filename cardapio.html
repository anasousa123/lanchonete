<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cardápio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🍔 Cardápio</h2>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
    <h3>X-Burger</h3>
    <p>R$ 20</p>
    <button class="btn-add" onclick="add('X-Burger',20)">Adicionar</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
    <h3>X-Salada</h3>
    <p>R$ 22</p>
    <button class="btn-add" onclick="add('X-Salada',22)">Adicionar</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1586190848861-99aa4a171e90">
    <h3>Batata Frita</h3>
    <p>R$ 15</p>
    <button class="btn-add" onclick="add('Batata',15)">Adicionar</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1581009137042-c552e485697a">
    <h3>Refrigerante</h3>
    <p>R$ 8</p>
    <button class="btn-add" onclick="add('Refri',8)">Adicionar</button>
  </div>

</div>

<a href="carrinho.html">🛒 Ver Carrinho</a>

<script src="app.js"></script>

</body>
</html>
