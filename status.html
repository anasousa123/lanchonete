<!DOCTYPE html>
<html>
<body>

<h2>Status do Pedido</h2>

<p id="status">Aguardando...</p>

<script type="module">
import { db, doc, onSnapshot } from "./firebase.js";

let id = localStorage.getItem("pedidoId");

onSnapshot(doc(db,"pedidos",id), (docSnap)=>{
  let p = docSnap.data();
  document.getElementById("status").innerText =
    "Status: " + p.status;
});
</script>

</body>
</html>
