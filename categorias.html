<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cardápio</title>
<link rel="stylesheet" href="style.css?v=4">
</head>

<body>

<div class="topo">
  <h1>🍔 CARDÁPIO</h1>
</div>

<div class="lista">

  <div class="item" onclick="abrir('sanduiches')">
    <h2>Sanduíches</h2>
    <p>X-Burger, X-Salada, X-Tudo...</p>
  </div>

  <div class="item" onclick="abrir('hotdog')">
    <h2>Cachorro-quente</h2>
    <p>Tradicional, completo, especial...</p>
  </div>

  <div class="item" onclick="abrir('porcoes')">
    <h2>Porções</h2>
    <p>Batata frita, nuggets, anéis de cebola...</p>
  </div>

  <div class="item" onclick="abrir('bebidas')">
    <h2>Bebidas</h2>
    <p>Refrigerantes, sucos, água...</p>
  </div>

  <div class="item" onclick="abrir('sobremesas')">
    <h2>Sobremesas</h2>
    <p>Açaí, milkshake, doces...</p>
  </div>

</div>

<script>
function abrir(categoria){
  localStorage.setItem("categoria", categoria);
  location.href = "produtos.html";
}
</script>

</body>
</html>
