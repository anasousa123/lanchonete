<!DOCTYPE html>
<html>
<body>

<h2>Cadastrar Produto</h2>

<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço">
<input id="img" placeholder="URL da imagem">

<button onclick="salvar()">Salvar</button>

<script type="module">
import { db, collection, addDoc } from "./firebase.js";

window.salvar = async function(){
  await addDoc(collection(db,"produtos"),{
    nome:document.getElementById("nome").value,
    preco:Number(document.getElementById("preco").value),
    imagem:document.getElementById("img").value
  });

  alert("Produto salvo!");
}
let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

onSnapshot(collection(db,"pedidos"), snap=>{
  audio.play(); // toca som quando chega pedido
});
</script>

</body>
</html>
